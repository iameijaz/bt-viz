<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BT Visualizer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#181c27;--border:#2a2f3f;--text:#e2e6f0;--muted:#6b7280;
  --seq:#1e3a5f;--seq-b:#3b82f6;--seq-t:#93c5fd;
  --fall:#3b2a1a;--fall-b:#f59e0b;--fall-t:#fcd34d;
  --rfall:#2d1f3a;--rfall-b:#a855f7;--rfall-t:#d8b4fe;
  --par:#1a2e1a;--par-b:#22c55e;--par-t:#86efac;
  --cond:#1f2937;--cond-b:#06b6d4;--cond-t:#67e8f9;
  --act:#1f2937;--act-b:#e2e8f0;--act-t:#f8fafc;
  --dec:#2a1f1f;--dec-b:#ef4444;--dec-t:#fca5a5;
  --sel:#0ea5e9;
  font-size:14px
}
body{background:var(--bg);color:var(--text);height:100vh;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;display:flex;flex-direction:column}

#toolbar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
#toolbar h1{font-size:13px;font-weight:600;color:var(--text);margin-right:4px;white-space:nowrap}
.sep{width:1px;height:20px;background:var(--border);margin:0 2px}
button{background:transparent;border:1px solid var(--border);color:var(--muted);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:12px;white-space:nowrap;transition:all .15s}
button:hover{background:var(--border);color:var(--text)}
button.active{background:#1e3a5f;border-color:var(--seq-b);color:var(--seq-t)}
#zoom-val{font-size:12px;color:var(--muted);min-width:36px;text-align:center}
#file-label{background:transparent;border:1px solid var(--seq-b);color:var(--seq-t);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:12px;white-space:nowrap}
#file-label:hover{background:#1e3a5f}
#file-input{display:none}
#tree-select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:6px;font-size:12px}
#search{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:4px 10px;border-radius:6px;font-size:12px;width:140px}
#search::placeholder{color:var(--muted)}
.legend{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted)}
.leg-dot{width:8px;height:8px;border-radius:2px}

#canvas-wrap{flex:1;overflow:hidden;position:relative}
#canvas{position:absolute;top:0;left:0;width:100%;height:100%;cursor:grab}
#canvas.grabbing{cursor:grabbing}
#canvas.panning{cursor:grabbing}
svg#tree-svg{position:absolute;top:0;left:0;pointer-events:none}

#minimap{position:absolute;bottom:12px;right:12px;width:160px;height:100px;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
#minimap canvas{width:100%;height:100%}

#tooltip{position:absolute;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:12px;pointer-events:none;opacity:0;transition:opacity .15s;max-width:240px;z-index:100}
#tooltip .tt-title{font-weight:600;font-size:13px;margin-bottom:4px}
#tooltip .tt-type{color:var(--muted);font-size:11px;margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
#tooltip .tt-port{display:flex;gap:6px;margin-top:3px;font-size:11px;color:var(--muted)}
#tooltip .tt-port span{color:var(--text)}

#drop-zone{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;pointer-events:none;opacity:1;transition:opacity .3s}
#drop-zone.hidden{opacity:0}
#drop-zone .dz-icon{width:48px;height:48px;border:2px dashed var(--border);border-radius:12px;display:flex;align-items:center;justify-content:center}
#drop-zone p{color:var(--muted);font-size:13px;text-align:center;line-height:1.6}
#drop-zone strong{color:var(--seq-t)}

#status{position:absolute;bottom:12px;left:12px;font-size:11px;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:4px 8px}
</style>
</head>
<body>

<div id="toolbar">
  <h1>BT Visualizer</h1>
  <div class="sep"></div>
  <label id="file-label" for="file-input">Open XML</label>
  <input type="file" id="file-input" accept=".xml">
  <div class="sep"></div>
  <select id="tree-select" style="display:none"></select>
  <div class="sep"></div>
  <button id="btn-fit">Fit</button>
  <button id="btn-zoom-in">+</button>
  <span id="zoom-val">100%</span>
  <button id="btn-zoom-out">-</button>
  <div class="sep"></div>
  <button id="btn-expand">Expand all</button>
  <button id="btn-collapse">Collapse all</button>
  <div class="sep"></div>
  <input type="text" id="search" placeholder="Search nodes...">
  <div class="sep"></div>
  <div class="legend">
    <div class="leg"><div class="leg-dot" style="background:#3b82f6"></div>Sequence</div>
    <div class="leg"><div class="leg-dot" style="background:#f59e0b"></div>Fallback</div>
    <div class="leg"><div class="leg-dot" style="background:#a855f7"></div>ReactiveFallback</div>
    <div class="leg"><div class="leg-dot" style="background:#22c55e"></div>Parallel</div>
    <div class="leg"><div class="leg-dot" style="background:#06b6d4"></div>Condition</div>
    <div class="leg"><div class="leg-dot" style="background:#e2e8f0"></div>Action</div>
    <div class="leg"><div class="leg-dot" style="background:#ef4444"></div>Decorator</div>
  </div>
</div>

<div id="canvas-wrap">
  <canvas id="canvas"></canvas>
  <div id="drop-zone">
    <div class="dz-icon">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="#6b7280" stroke-width="1.5">
        <path d="M10 3v10M6 9l4-4 4 4M3 14v1a2 2 0 002 2h10a2 2 0 002-2v-1"/>
      </svg>
    </div>
    <p>Drop a <strong>BT XML file</strong> here<br>or use <strong>Open XML</strong> above</p>
    <p style="font-size:11px;margin-top:-8px">Supports BehaviorTree.CPP format 4</p>
  </div>
  <div id="minimap"><canvas id="mm-canvas"></canvas></div>
  <div id="tooltip">
    <div class="tt-title" id="tt-title"></div>
    <div class="tt-type" id="tt-type"></div>
    <div id="tt-ports"></div>
  </div>
  <div id="status" id="status-bar">No file loaded</div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const mmCanvas = document.getElementById('mm-canvas');
const mmCtx = mmCanvas.getContext('2d');
const tooltip = document.getElementById('tooltip');
const dropZone = document.getElementById('drop-zone');
const statusEl = document.getElementById('status');

let W = 0, H = 0;
let cam = {x: 0, y: 0, zoom: 1};
let nodes = [];
let edges = [];
let parsedTrees = {};
let activeTree = null;
let nodeModel = {};
let hoveredNode = null;
let selectedNode = null;
let dragging = null;
let dragOffset = {x:0, y:0};
let panning = false;
let panStart = {x:0, y:0};
let camStart = {x:0, y:0};
let searchTerm = '';
let collapsedNodes = new Set();

const NODE_W = 148;
const NODE_H = 44;
const V_GAP = 28;
const H_GAP = 14;

const COLORS = {
  Sequence:        {bg:'#1e3a5f', border:'#3b82f6', text:'#93c5fd', label:'#bfdbfe'},
  Fallback:        {bg:'#3b2a1a', border:'#f59e0b', text:'#fcd34d', label:'#fde68a'},
  ReactiveFallback:{bg:'#2d1f3a', border:'#a855f7', text:'#d8b4fe', label:'#e9d5ff'},
  ReactiveSequence:{bg:'#1e3a5f', border:'#60a5fa', text:'#bfdbfe', label:'#dbeafe'},
  Parallel:        {bg:'#1a2e1a', border:'#22c55e', text:'#86efac', label:'#bbf7d0'},
  Condition:       {bg:'#0e2233', border:'#06b6d4', text:'#67e8f9', label:'#a5f3fc'},
  Action:          {bg:'#1c2333', border:'#94a3b8', text:'#e2e8f0', label:'#f1f5f9'},
  Decorator:       {bg:'#2a1f1f', border:'#ef4444', text:'#fca5a5', label:'#fecaca'},
  SubTree:         {bg:'#1a1a2e', border:'#818cf8', text:'#c7d2fe', label:'#e0e7ff'},
  Root:            {bg:'#1a1a1a', border:'#6b7280', text:'#9ca3af', label:'#d1d5db'},
};

const CONTROL_NODES = new Set([
  'Sequence','Fallback','ReactiveFallback','ReactiveSequence',
  'Parallel','IfThenElse','Switch'
]);
const DECORATOR_NODES = new Set([
  'Inverter','Repeat','RetryUntilSuccessful','Timeout',
  'ForceSuccess','ForceFailure','RepeatUntilMissionEnd',
  'RepeatUntilFailure','LoopUntilFireOut','Delay','KeepRunningUntilFailure'
]);

function nodeType(tag) {
  if (CONTROL_NODES.has(tag)) return tag;
  if (DECORATOR_NODES.has(tag)) return 'Decorator';
  if (nodeModel[tag]) return nodeModel[tag];
  return 'Action';
}

function nodeColors(tag) {
  const t = nodeType(tag);
  return COLORS[t] || COLORS.Action;
}

function parseXML(xmlStr) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xmlStr, 'text/xml');
  if (doc.querySelector('parsererror')) throw new Error('Invalid XML');

  nodeModel = {};
  const modelEl = doc.querySelector('TreeNodesModel');
  if (modelEl) {
    for (const child of modelEl.children) {
      const id = child.getAttribute('ID');
      if (!id) continue;
      const tag = child.tagName;
      const ports = [];
      for (const port of child.children) {
        ports.push({dir: port.tagName.replace('_port',''), name: port.getAttribute('name')});
      }
      nodeModel[id] = tag === 'Condition' ? 'Condition' : tag === 'Decorator' ? 'Decorator' : 'Action';
      if (ports.length) nodeModel[id + '__ports'] = ports;
    }
  }

  parsedTrees = {};
  for (const btEl of doc.querySelectorAll('BehaviorTree')) {
    const id = btEl.getAttribute('ID') || 'Tree';
    parsedTrees[id] = btEl.firstElementChild;
  }

  const main = doc.querySelector('root')?.getAttribute('main_tree_to_execute');
  return {trees: parsedTrees, main, model: nodeModel};
}

let _idCounter = 0;
function buildTree(el, depth=0, parent=null) {
  if (!el || el.nodeType !== 1) return null;
  const tag = el.tagName;
  const name = el.getAttribute('name') || el.getAttribute('ID') || tag;
  const id = ++_idCounter;

  const attrs = {};
  for (const a of el.attributes) attrs[a.name] = a.value;

  const ports = nodeModel[tag + '__ports'] || [];
  const nodeAttrs = {};
  for (const p of ports) {
    const val = el.getAttribute(p.name);
    if (val) nodeAttrs[p.name] = val;
  }
  // also grab non-standard attrs as ports
  for (const a of el.attributes) {
    if (!['name','ID'].includes(a.name)) nodeAttrs[a.name] = a.value;
  }

  const children = [];
  for (const child of el.children) {
    const c = buildTree(child, depth+1, id);
    if (c) children.push(c);
  }

  return {id, tag, name, depth, parent, children, attrs: nodeAttrs, x:0, y:0, w:NODE_W, h:NODE_H, collapsed:false};
}

function flattenTree(node, arr=[]) {
  arr.push(node);
  if (!collapsedNodes.has(node.id)) {
    for (const c of node.children) flattenTree(c, arr);
  }
  return arr;
}

function subtreeWidth(node) {
  if (collapsedNodes.has(node.id) || !node.children.length) return node.w;
  const childWidths = node.children.map(subtreeWidth);
  const total = childWidths.reduce((a,b)=>a+b+H_GAP, -H_GAP);
  return Math.max(node.w, total);
}

function layoutTree(node, x, y) {
  node.x = x;
  node.y = y;
  if (collapsedNodes.has(node.id) || !node.children.length) return;

  const childY = y + node.h + V_GAP;
  const widths = node.children.map(subtreeWidth);
  const total = widths.reduce((a,b)=>a+b+H_GAP, -H_GAP);
  let cx = x + node.w/2 - total/2;

  for (let i=0; i<node.children.length; i++) {
    const cw = widths[i];
    layoutTree(node.children[i], cx + cw/2 - node.children[i].w/2, childY);
    cx += cw + H_GAP;
  }
}

function buildEdges(node, arr=[]) {
  if (collapsedNodes.has(node.id)) return arr;
  for (const child of node.children) {
    arr.push({from: node, to: child});
    buildEdges(child, arr);
  }
  return arr;
}

function loadTree(treeId) {
  activeTree = treeId;
  _idCounter = 0;
  const rootEl = parsedTrees[treeId];
  if (!rootEl) return;
  const root = buildTree(rootEl);
  if (!root) return;
  layoutTree(root, 0, 0);
  nodes = flattenTree(root);
  edges = buildEdges(root);
  fitView();
  render();
  updateMinimap();
  statusEl.textContent = `${treeId} — ${nodes.length} nodes`;
}

function fitView() {
  if (!nodes.length) return;
  let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
  for (const n of nodes) {
    minX = Math.min(minX, n.x); minY = Math.min(minY, n.y);
    maxX = Math.max(maxX, n.x+n.w); maxY = Math.max(maxY, n.y+n.h);
  }
  const pw = W - 40, ph = H - 40;
  const tw = maxX - minX, th = maxY - minY;
  const zoom = Math.min(pw/tw, ph/th, 1.5);
  cam.zoom = zoom;
  cam.x = (W - tw*zoom)/2 - minX*zoom;
  cam.y = (H - th*zoom)/2 - minY*zoom;
  updateZoomLabel();
}

function worldToScreen(wx, wy) {
  return {x: wx*cam.zoom + cam.x, y: wy*cam.zoom + cam.y};
}

function screenToWorld(sx, sy) {
  return {x: (sx - cam.x)/cam.zoom, y: (sy - cam.y)/cam.zoom};
}

function nodeAt(sx, sy) {
  const w = screenToWorld(sx, sy);
  for (let i=nodes.length-1; i>=0; i--) {
    const n = nodes[i];
    if (w.x >= n.x && w.x <= n.x+n.w && w.y >= n.y && w.y <= n.y+n.h) return n;
  }
  return null;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.arcTo(x+w,y, x+w,y+r, r);
  ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w,y+h, x+w-r,y+h, r);
  ctx.lineTo(x+r, y+h); ctx.arcTo(x,y+h, x,y+h-r, r);
  ctx.lineTo(x, y+r); ctx.arcTo(x,y, x+r,y, r);
  ctx.closePath();
}

function truncate(str, maxW, ctx2) {
  if (ctx2.measureText(str).width <= maxW) return str;
  while (str.length > 1 && ctx2.measureText(str+'…').width > maxW) str = str.slice(0,-1);
  return str + '…';
}

function render() {
  ctx.clearRect(0, 0, W, H);

  if (!nodes.length) return;

  ctx.save();
  ctx.translate(cam.x, cam.y);
  ctx.scale(cam.zoom, cam.zoom);

  // Draw edges
  ctx.lineWidth = 1.5 / cam.zoom;
  for (const e of edges) {
    const fx = e.from.x + e.from.w/2;
    const fy = e.from.y + e.from.h;
    const tx = e.to.x + e.to.w/2;
    const ty = e.to.y;
    const my = (fy + ty) / 2;

    ctx.beginPath();
    ctx.moveTo(fx, fy);
    ctx.bezierCurveTo(fx, my, tx, my, tx, ty);

    const isHighlighted = searchTerm && (
      e.from.name.toLowerCase().includes(searchTerm) ||
      e.to.name.toLowerCase().includes(searchTerm)
    );

    ctx.strokeStyle = isHighlighted ? '#3b82f680' : '#2a2f3f';
    ctx.stroke();

    // arrowhead
    ctx.beginPath();
    const ah = 5/cam.zoom;
    ctx.moveTo(tx, ty);
    ctx.lineTo(tx-ah/2, ty-ah);
    ctx.lineTo(tx+ah/2, ty-ah);
    ctx.closePath();
    ctx.fillStyle = isHighlighted ? '#3b82f680' : '#2a2f3f';
    ctx.fill();
  }

  // Draw nodes
  for (const n of nodes) {
    const c = nodeColors(n.tag);
    const isSelected = selectedNode?.id === n.id;
    const isHovered  = hoveredNode?.id === n.id;
    const isSearch   = searchTerm && n.name.toLowerCase().includes(searchTerm);
    const isCollapsed = collapsedNodes.has(n.id) && n.children.length > 0;

    const r = n.tag === 'Condition' ? n.h/2 : (CONTROL_NODES.has(n.tag) ? 6 : 4);

    // Shadow for selected
    if (isSelected) {
      ctx.shadowColor = c.border;
      ctx.shadowBlur  = 10/cam.zoom;
    }

    // Fill
    roundRect(ctx, n.x, n.y, n.w, n.h, r);
    ctx.fillStyle = isSearch ? c.border + '44' : c.bg;
    ctx.fill();

    // Border
    ctx.lineWidth = isSelected ? 2/cam.zoom : isHovered ? 1.5/cam.zoom : 1/cam.zoom;
    ctx.strokeStyle = isSelected ? '#ffffff' : isSearch ? c.border : isHovered ? c.border : c.border + '80';
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Collapse indicator
    if (n.children.length > 0) {
      const cx2 = n.x + n.w - 10;
      const cy2 = n.y + n.h/2;
      const sz  = 4/cam.zoom;
      ctx.fillStyle = c.border + 'aa';
      ctx.beginPath();
      if (isCollapsed) {
        ctx.moveTo(cx2-sz, cy2-sz); ctx.lineTo(cx2+sz, cy2); ctx.lineTo(cx2-sz, cy2+sz);
      } else {
        ctx.moveTo(cx2-sz, cy2-sz/2); ctx.lineTo(cx2+sz, cy2-sz/2); ctx.lineTo(cx2, cy2+sz/2);
      }
      ctx.closePath();
      ctx.fill();
    }

    // Type tag (control nodes only at high zoom)
    if (CONTROL_NODES.has(n.tag) && cam.zoom > 0.5) {
      const tagH = 14;
      roundRect(ctx, n.x, n.y, n.w, tagH, r);
      ctx.fillStyle = c.border + '30';
      ctx.fill();
    }

    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    if (CONTROL_NODES.has(n.tag) && cam.zoom > 0.5) {
      ctx.font = `500 ${9/cam.zoom}px -apple-system,sans-serif`;
      ctx.fillStyle = c.border;
      ctx.fillText(n.tag, n.x + n.w/2, n.y + 7/cam.zoom);

      ctx.font = `500 ${11/cam.zoom}px -apple-system,sans-serif`;
      ctx.fillStyle = c.text;
      const label = truncate(n.name, n.w - 24/cam.zoom, ctx);
      ctx.fillText(label, n.x + n.w/2, n.y + n.h/2 + 4/cam.zoom);
    } else {
      ctx.font = `${11/cam.zoom}px -apple-system,sans-serif`;
      ctx.fillStyle = c.text;
      const label = truncate(n.name, n.w - 20/cam.zoom, ctx);
      ctx.fillText(label, n.x + n.w/2, n.y + n.h/2);
    }

    // Port dots
    if (Object.keys(n.attrs).length && cam.zoom > 0.7) {
      ctx.beginPath();
      ctx.arc(n.x + 8/cam.zoom, n.y + n.h/2, 3/cam.zoom, 0, Math.PI*2);
      ctx.fillStyle = c.border + 'aa';
      ctx.fill();
    }

    // Collapsed count badge
    if (isCollapsed) {
      const bw = 22/cam.zoom, bh = 14/cam.zoom;
      const bx = n.x + n.w/2 - bw/2;
      const by = n.y + n.h + 4/cam.zoom;
      roundRect(ctx, bx, by, bw, bh, 3/cam.zoom);
      ctx.fillStyle = c.border + '30';
      ctx.fill();
      ctx.font = `${9/cam.zoom}px -apple-system,sans-serif`;
      ctx.fillStyle = c.border;
      ctx.fillText(countDescendants(n) + '', n.x + n.w/2, by + bh/2);
    }
  }

  ctx.restore();
}

function countDescendants(node) {
  let c = node.children.length;
  for (const ch of node.children) c += countDescendants(ch);
  return c;
}

function updateMinimap() {
  const mw = mmCanvas.width = 320;
  const mh = mmCanvas.height = 200;
  mmCtx.clearRect(0,0,mw,mh);
  if (!nodes.length) return;

  let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
  for (const n of nodes) {
    minX=Math.min(minX,n.x); minY=Math.min(minY,n.y);
    maxX=Math.max(maxX,n.x+n.w); maxY=Math.max(maxY,n.y+n.h);
  }
  const tw=maxX-minX, th=maxY-minY;
  const zoom=Math.min((mw-8)/tw, (mh-8)/th);
  const ox=(mw-tw*zoom)/2, oy=(mh-th*zoom)/2;

  for (const e of edges) {
    const fx=(e.from.x+e.from.w/2-minX)*zoom+ox;
    const fy=(e.from.y+e.from.h-minY)*zoom+oy;
    const tx=(e.to.x+e.to.w/2-minX)*zoom+ox;
    const ty=(e.to.y-minY)*zoom+oy;
    mmCtx.beginPath(); mmCtx.moveTo(fx,fy);
    const my=(fy+ty)/2;
    mmCtx.bezierCurveTo(fx,my,tx,my,tx,ty);
    mmCtx.strokeStyle='#2a2f3f'; mmCtx.lineWidth=0.5; mmCtx.stroke();
  }
  for (const n of nodes) {
    const c=nodeColors(n.tag);
    const nx=(n.x-minX)*zoom+ox, ny=(n.y-minY)*zoom+oy;
    const nw=n.w*zoom, nh=n.h*zoom;
    mmCtx.fillStyle=c.border+'aa';
    mmCtx.fillRect(nx,ny,Math.max(nw,2),Math.max(nh,2));
  }

  // viewport rect
  const vx=(-cam.x/cam.zoom-minX)*zoom+ox;
  const vy=(-cam.y/cam.zoom-minY)*zoom+oy;
  const vw=(W/cam.zoom)*zoom, vh=(H/cam.zoom)*zoom;
  mmCtx.strokeStyle='#60a5fa'; mmCtx.lineWidth=1;
  mmCtx.strokeRect(vx,vy,vw,vh);
}

function updateZoomLabel() {
  document.getElementById('zoom-val').textContent = Math.round(cam.zoom*100)+'%';
}

function resizeCanvas() {
  const wrap = document.getElementById('canvas-wrap');
  W = canvas.width = wrap.clientWidth;
  H = canvas.height = wrap.clientHeight;
  render();
  updateMinimap();
}

function setZoom(z, cx, cy) {
  cx = cx ?? W/2; cy = cy ?? H/2;
  const wBefore = screenToWorld(cx, cy);
  cam.zoom = Math.max(0.08, Math.min(3, z));
  const wAfter = screenToWorld(cx, cy);
  cam.x += (wAfter.x - wBefore.x)*cam.zoom;
  cam.y += (wAfter.y - wBefore.y)*cam.zoom;
  updateZoomLabel();
  render();
  updateMinimap();
}

// ── Events ────────────────────────────────────────────────────────────────────

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.12 : 1/1.12;
  setZoom(cam.zoom * factor, e.offsetX, e.offsetY);
}, {passive:false});

canvas.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  const n = nodeAt(e.offsetX, e.offsetY);
  if (n) {
    selectedNode = n;
    dragging = n;
    dragOffset = {x: e.offsetX - n.x*cam.zoom - cam.x, y: e.offsetY - n.y*cam.zoom - cam.y};
  } else {
    panning = true;
    panStart = {x: e.offsetX, y: e.offsetY};
    camStart = {x: cam.x, y: cam.y};
    canvas.classList.add('panning');
  }
  render();
});

canvas.addEventListener('mousemove', e => {
  if (dragging) {
    dragging.x = (e.offsetX - dragOffset.x - cam.x) / cam.zoom;
    dragging.y = (e.offsetY - dragOffset.y - cam.y) / cam.zoom;
    edges = buildEdges(nodes[0].__root || nodes[0]);
    render(); updateMinimap();
    return;
  }
  if (panning) {
    cam.x = camStart.x + (e.offsetX - panStart.x);
    cam.y = camStart.y + (e.offsetY - panStart.y);
    render(); updateMinimap();
    return;
  }
  const n = nodeAt(e.offsetX, e.offsetY);
  if (n !== hoveredNode) { hoveredNode = n; render(); }
  if (n) {
    const tt = tooltip;
    tt.style.opacity = '1';
    const tx = e.offsetX + 14, ty = e.offsetY - 10;
    tt.style.left = (tx + 260 > W ? tx-280 : tx)+'px';
    tt.style.top  = ty+'px';
    document.getElementById('tt-title').textContent = n.name;
    document.getElementById('tt-type').textContent  = n.tag + ' · ' + nodeType(n.tag);
    const portsEl = document.getElementById('tt-ports');
    portsEl.innerHTML = '';
    for (const [k,v] of Object.entries(n.attrs)) {
      const d = document.createElement('div');
      d.className = 'tt-port';
      d.innerHTML = `<span style="color:var(--muted)">${k}:</span><span>${v}</span>`;
      portsEl.appendChild(d);
    }
    if (n.children.length) {
      const d = document.createElement('div');
      d.className = 'tt-port';
      d.innerHTML = `<span style="color:var(--muted)">children:</span><span>${n.children.length}${collapsedNodes.has(n.id)?` (collapsed, ${countDescendants(n)} hidden)`:''}</span>`;
      portsEl.appendChild(d);
    }
  } else {
    tooltip.style.opacity = '0';
  }
});

canvas.addEventListener('mouseup', e => {
  dragging = null;
  panning = false;
  canvas.classList.remove('panning');
});

canvas.addEventListener('mouseleave', () => {
  hoveredNode = null;
  tooltip.style.opacity = '0';
  dragging = null;
  panning = false;
  canvas.classList.remove('panning');
  render();
});

canvas.addEventListener('dblclick', e => {
  const n = nodeAt(e.offsetX, e.offsetY);
  if (!n || !n.children.length) return;
  if (collapsedNodes.has(n.id)) {
    collapsedNodes.delete(n.id);
  } else {
    collapsedNodes.add(n.id);
  }
  rebuildLayout();
});

canvas.addEventListener('contextmenu', e => e.preventDefault());

function rebuildLayout() {
  if (!nodes.length) return;
  const root = nodes[0];
  layoutTree(root, 0, 0);
  nodes = flattenTree(root);
  edges = buildEdges(root);
  render(); updateMinimap();
}

document.getElementById('btn-fit').onclick = () => { fitView(); render(); updateMinimap(); };
document.getElementById('btn-zoom-in').onclick  = () => setZoom(cam.zoom * 1.25);
document.getElementById('btn-zoom-out').onclick = () => setZoom(cam.zoom / 1.25);

document.getElementById('btn-expand').onclick = () => {
  collapsedNodes.clear(); rebuildLayout();
};
document.getElementById('btn-collapse').onclick = () => {
  for (const n of nodes) if (n.children.length) collapsedNodes.add(n.id);
  rebuildLayout();
};

document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value.toLowerCase().trim();
  render();
  if (searchTerm) {
    const match = nodes.find(n => n.name.toLowerCase().includes(searchTerm));
    if (match) {
      cam.x = W/2 - (match.x + match.w/2)*cam.zoom;
      cam.y = H/2 - (match.y + match.h/2)*cam.zoom;
      selectedNode = match;
      render(); updateMinimap();
    }
  }
});

document.getElementById('tree-select').addEventListener('change', e => {
  collapsedNodes.clear();
  loadTree(e.target.value);
});

function loadXMLString(str) {
  try {
    const {trees, main} = parseXML(str);
    const sel = document.getElementById('tree-select');
    sel.innerHTML = '';
    const ids = Object.keys(trees);
    if (!ids.length) { statusEl.textContent = 'No BehaviorTree elements found'; return; }
    for (const id of ids) {
      const opt = document.createElement('option');
      opt.value = id; opt.textContent = id;
      sel.appendChild(opt);
    }
    sel.style.display = ids.length > 1 ? '' : 'none';
    const active = main && trees[main] ? main : ids[0];
    sel.value = active;
    collapsedNodes.clear();
    dropZone.classList.add('hidden');
    loadTree(active);
  } catch(err) {
    statusEl.textContent = 'Parse error: ' + err.message;
  }
}

document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => loadXMLString(ev.target.result);
  reader.readAsText(file);
});

const wrap = document.getElementById('canvas-wrap');
wrap.addEventListener('dragover', e => { e.preventDefault(); });
wrap.addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => loadXMLString(ev.target.result);
  reader.readAsText(file);
});

window.addEventListener('resize', resizeCanvas);
resizeCanvas();
